name: Netguard-Alpha CI

on:
  push:
    branches: [ "main" ]
jobs:
  laravel-docker-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create .env
        run: | 
          cp .env.example .env

          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
          echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}" >> .env

      - name: Build and Orchestrate
        run: docker compose -f docker-compose.yml up -d --build
      
      - name: Debug DB Failure
        if: failure() # Only runs if a previous step failed
        run: |
          docker compose logs db
          docker inspect netguard_alpha_db --format='{{json .State.Health}}'

      - name: Verify Container Health
        run: docker compose ps

      - name: Run Artisan Check
        run: docker compose exec -T app php artisan --version

      - name: Shutdown
        run: docker compose down -v